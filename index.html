<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone Engine v5.5</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        
        /* شريط الأدوات العلوي النحيف (حل مشكلة المساحة) */
        #toolbar { position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: rgba(15,15,20,0.9); border-bottom: 1px solid #d4a373; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        
        /* لوحة التحكم الجانبية القابلة للطي */
        #side-panel { position: absolute; top: 40px; right: -250px; width: 240px; height: calc(100% - 40px); background: rgba(10,10,15,0.95); border-left: 1px solid #333; transition: right 0.3s ease; padding: 15px; box-sizing: border-box; z-index: 90; }
        #side-panel.open { right: 0; }
        
        #toggle-panel { background: #d4a373; color: #000; border: none; padding: 5px 15px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 11px; }

        .slider-group { margin-bottom: 15px; }
        .slider-group label { display: block; font-size: 11px; color: #d4a373; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: #d4a373; }

        #asset-browser { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 4px; height: 300px; border: 1px solid #222; }
        .asset-item { background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 3px; cursor: pointer; text-align: center; font-size: 12px; border: 1px solid #222; }
        .asset-item:hover { border-color: #d4a373; }

        #asset-info { margin-top: 15px; padding: 10px; border: 1px solid #d4a373; border-radius: 5px; display: none; background: rgba(212, 163, 115, 0.1); }
        .btn-action { width: 100%; background: #d4a373; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; font-size: 12px; margin-top: 5px; }

        #ui-bottom-left { position: absolute; bottom: 20px; left: 20px; pointer-events: none; }
        .key-tag { color: #d4a373; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <!-- شريط الأدوات العلوي -->
    <div id="toolbar">
        <div style="font-weight: bold; font-size: 14px; color: #d4a373;">TACTICAL ENGINE <span style="color:white; font-size: 10px;">V5.5</span></div>
        <div style="display: flex; gap: 20px;">
            <button id="toggle-panel">ASSETS & SETTINGS</button>
            <button id="toggle-panel" onclick="toggleFullscreen()" style="background:#333; color:white;">FULLSCREEN</button>
        </div>
    </div>

    <!-- لوحة التحكم الجانبية -->
    <div id="side-panel">
        <div class="slider-group">
            <label>Mouse Sensitivity (Rotation)</label>
            <input type="range" id="rot-sens" min="500" max="5000" value="2000">
        </div>
        <div class="slider-group">
            <label>WASD Speed (Flying)</label>
            <input type="range" id="fly-sens" min="1" max="100" value="30">
        </div>

        <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
        
        <h3 style="font-size: 13px; color: #d4a373; margin-bottom: 10px;">ASSET LIBRARY</h3>
        <div id="asset-browser">
            <div id="file-list">Scanning GitHub...</div>
        </div>

        <div id="asset-info">
            <div id="selected-name" style="font-size: 12px; margin-bottom: 5px; font-weight: bold;">File.glb</div>
            <button class="btn-action" id="spawn-btn">ADD TO SCENE</button>
        </div>
    </div>

    <div id="ui-bottom-left">
        <p style="font-size: 11px; opacity: 0.7;">
            <span class="key-tag">[R-Click]</span> Rotate | 
            <span class="key-tag">[Shift+WASD]</span> Fly | 
            <span class="key-tag">[G,R,S]</span> Edit | 
            <span class="key-tag">[Ctrl+D]</span> Clone
        </p>
    </div>

    <script>
        const GITHUB_USER = "icarusvancross";
        const GITHUB_REPO = "SusurrusOfYlemAlone";
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let pendingAssetUrl = null;
        let selectedMesh = null;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.02, 1);
            
            // الكاميرا
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 30, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true, false, 2); 
            camera.wheelPrecision = 50;

            // ربط السلايدر بالحساسية
            const rotSens = document.getElementById("rot-sens");
            camera.angularSensibilityX = camera.angularSensibilityY = rotSens.value;
            rotSens.oninput = () => { camera.angularSensibilityX = camera.angularSensibilityY = rotSens.value; };

            const flySens = document.getElementById("fly-sens");

            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.5;
            const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.0;

            // --- عودة الأرضية الترابية (Dirt/Sand) ---
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 500, height: 500}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.4, 0.35, 0.3); // لون ترابي عاتم
            const noise = new BABYLON.NoiseProceduralTexture("noise", 512, scene);
            noise.octaves = 4;
            groundMat.bumpTexture = noise; // ملمس خشن
            ground.material = groundMat;

            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // نظام الحركة
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                if (evt.sourceEvent.ctrlKey && evt.sourceEvent.key === "d") evt.sourceEvent.preventDefault();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                if (inputMap["shift"]) {
                    // سرعة WASD مرتبطة بالسلايدر
                    let speed = flySens.value / 100; 
                    let forward = camera.getForwardRay().direction;
                    let right = BABYLON.Vector3.Cross(BABYLON.Vector3.Up(), forward).normalize();

                    if (inputMap["w"]) camera.target.addInPlace(forward.scale(speed));
                    if (inputMap["s"]) camera.target.addInPlace(forward.scale(-speed));
                    if (inputMap["a"]) camera.target.addInPlace(right.scale(speed));
                    if (inputMap["d"]) camera.target.addInPlace(right.scale(-speed));
                }
            });

            scene.onPointerDown = (evt, pickResult) => {
                if (pickResult.hit && pickResult.pickedMesh.name !== "ground") {
                    selectedMesh = pickResult.pickedMesh;
                }
            };

            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                if (e.ctrlKey && e.key.toLowerCase() === "d" && selectedMesh) {
                    let copy = selectedMesh.clone(selectedMesh.name + "_copy");
                    copy.position.x += 5;
                }
            });

            // التحكم في اللوحة الجانبية
            const panel = document.getElementById("side-panel");
            document.getElementById("toggle-panel").onclick = () => { panel.classList.toggle("open"); };

            async function fetchAssets() {
                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                    const files = await res.json();
                    const list = document.getElementById("file-list");
                    list.innerHTML = "";
                    files.forEach(f => {
                        if (f.name.toLowerCase().endsWith(".glb")) {
                            let d = document.createElement("div");
                            d.className = "asset-item"; d.innerText = f.name;
                            d.onclick = () => {
                                pendingAssetUrl = f.download_url;
                                document.getElementById("selected-name").innerText = f.name;
                                document.getElementById("asset-info").style.display = "block";
                            };
                            list.appendChild(d);
                        }
                    });
                } catch(e) { console.error("GitHub Fail"); }
            }
            fetchAssets();

            document.getElementById("spawn-btn").onclick = () => {
                if (pendingAssetUrl) {
                    BABYLON.SceneLoader.ImportMesh("", "", pendingAssetUrl, scene, (meshes) => {
                        let main = BABYLON.Mesh.MergeMeshes(meshes.filter(m => m.getTotalIndices() > 0), true, true, undefined, false, true);
                        if(main) main.position = camera.target.clone();
                        document.getElementById("asset-info").style.display = "none";
                    });
                }
            };

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());

        function toggleFullscreen() {
            if (!document.fullscreenElement) canvas.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
