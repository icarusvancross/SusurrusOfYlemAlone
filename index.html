<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone - Tactical Engine</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #ui-top { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border-left: 5px solid #d4a373; pointer-events: none; z-index: 10; }
        #asset-browser { position: absolute; top: 10px; right: 10px; width: 200px; height: 90%; background: rgba(20,20,20,0.9); border: 1px solid #333; color: #eee; padding: 10px; border-radius: 8px; overflow-y: auto; z-index: 10; }
        .asset-item { background: #333; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; text-align: center; font-size: 12px; transition: 0.3s; border: 1px solid transparent; }
        .asset-item:hover { background: #444; border-color: #d4a373; color: #d4a373; }
        .key-hint { color: #d4a373; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2 style="margin:0; font-size: 18px; color:#d4a373;">TACTICAL ENGINE V1.8</h2>
        <hr>
        <p style="font-size: 12px;"><span class="key-hint">Shift + WASD</span>: Fly/Move Camera</p>
        <p style="font-size: 12px;"><span class="key-hint">G | R | S</span>: Move/Rotate/Scale Mesh</p>
        <p style="font-size: 12px;"><span class="key-hint">Shift + D</span>: Duplicate</p>
    </div>

    <div id="asset-browser">
        <h3 style="font-size: 14px; text-align: center;">ASSET BROWSER</h3>
        <hr>
        <div id="file-list"></div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        // قائمة الملفات - أضف ملفاتك هنا
        const myAssets = ["Bigtree.glb"];

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.1, 1);

            // الكاميرا (ArcRotate)
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);
            camera.panningSensibility = 1000; // تحسين سلاسة الحركة

            const light = new BABYLON.DirectionalLight("dir01", new BABYLON.Vector3(-1, -2, -1), scene);
            light.position = new BABYLON.Vector3(20, 40, 20);
            light.intensity = 1.2;
            new BABYLON.HemisphericLight("light2", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.5;

            // الأرضية الرملية
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 200, height: 200}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.76, 0.64, 0.45); // بيج رملي
            groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
            ground.material = groundMat;

            // Gizmos
            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // --- نظام الحركة (Shift + WASD) ---
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                // شرط الحركة: يجب أن يكون Shift مضغوطاً
                if (inputMap["shift"]) {
                    let speed = 0.2;
                    let forwards = camera.getForwardRay().direction;
                    forwards.y = 0; // منع الكاميرا من الطيران للأعلى عند الضغط على W
                    forwards.normalize();
                    
                    let sideways = BABYLON.Vector3.Cross(forwards, BABYLON.Vector3.Up());
                    sideways.normalize();

                    if (inputMap["w"]) { camera.target.addInPlace(forwards.scale(speed)); }
                    if (inputMap["s"]) { camera.target.addInPlace(forwards.scale(-speed)); }
                    if (inputMap["a"]) { camera.target.addInPlace(sideways.scale(speed)); }
                    if (inputMap["d"]) { camera.target.addInPlace(sideways.scale(-speed)); }
                }
            });

            // تحكم الـ Gizmos و Duplicate
            let selectedMesh = null;
            scene.onPointerDown = (evt, pickResult) => { if (pickResult.hit) selectedMesh = pickResult.pickedMesh; };

            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                if (e.shiftKey && e.key.toLowerCase() === "d") {
                    if (selectedMesh && selectedMesh.name !== "ground") {
                        let copy = selectedMesh.clone(selectedMesh.name + "_copy");
                        copy.position.x += 2;
                    }
                }
            });

            // Asset Browser logic
            const listContainer = document.getElementById("file-list");
            myAssets.forEach(file => {
                const item = document.createElement("div");
                item.className = "asset-item";
                item.innerText = file;
                item.onclick = () => {
                    BABYLON.SceneLoader.ImportMesh("", "./", file, scene, (meshes) => {
                        meshes[0].position = camera.target.clone(); // ينزل الغرض عند مكان الكاميرا
                    });
                };
                listContainer.appendChild(item);
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => { scene.render(); });
        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
