<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone Engine v3.6</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { pointer-events: auto; background: rgba(10,10,15,0.9); border: 1px solid #333; border-radius: 8px; padding: 15px; }
        #top-info { position: absolute; top: 10px; left: 10px; border-left: 4px solid #d4a373; }
        #asset-browser { position: absolute; top: 10px; right: 10px; width: 240px; height: 70%; overflow-y: auto; }
        #asset-info { position: absolute; bottom: 20px; right: 10px; width: 240px; display: none; border-bottom: 4px solid #d4a373; }
        .asset-item { background: #1a1a1a; padding: 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; text-align: center; border: 1px solid #222; }
        .asset-item:hover { border-color: #d4a373; background: #222; }
        .btn-spawn { width: 100%; background: #d4a373; color: #000; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #loading-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: #d4a373; background: rgba(0,0,0,0.8); padding: 5px 20px; border-radius: 20px; display: none; }
        .key-hint { color: #d4a373; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-info" class="panel">
            <h2 style="margin:0; font-size: 18px;">TACTICAL ENGINE <span style="color:#d4a373">V3.6</span></h2>
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            <p style="font-size: 12px;"><span class="key-hint">Shift + WASD</span>: Fly</p>
            <p style="font-size: 12px;"><span class="key-hint">G | R | S</span>: Gizmos</p>
            <p style="font-size: 12px;"><span class="key-hint">CTRL + D</span>: Duplicate</p>
        </div>

        <div id="asset-browser" class="panel">
            <h3 style="font-size: 14px; text-align: center; margin-top:0;">ASSET LIBRARY</h3>
            <div id="file-list"></div>
        </div>

        <div id="asset-info" class="panel">
            <h4 id="selected-name" style="margin:0; color:#d4a373;">File.glb</h4>
            <button class="btn-spawn" id="spawn-btn">ADD TO WORLD</button>
        </div>

        <div id="loading-bar">DOWNLOADING: <span id="percent">0%</span></div>
    </div>

    <script>
        // إعدادات المستودع
        const GITHUB_USER = "icarusvancross";
        const GITHUB_REPO = "SusurrusOfYlemAlone";
        
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let pendingAssetUrl = null;
        let selectedMesh = null;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.02, 1);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 20, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.6;
            const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.0;

            // الأرضية السوداء المنقطة
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 200, height: 200}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.02, 0.02, 0.02);
            const noise = new BABYLON.NoiseProceduralTexture("noise", 512, scene);
            noise.octaves = 8;
            groundMat.emissiveTexture = noise;
            groundMat.emissiveColor = new BABYLON.Color3(0.1, 0.1, 0.08);
            ground.material = groundMat;

            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // نظام الحركة WASD + Shift
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                if (evt.sourceEvent.ctrlKey && evt.sourceEvent.key.toLowerCase() === "d") evt.sourceEvent.preventDefault();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                if (inputMap["shift"]) {
                    let speed = 0.4;
                    let forwards = camera.getForwardRay().direction;
                    forwards.y = 0; forwards.normalize();
                    let sideways = BABYLON.Vector3.Cross(forwards, BABYLON.Vector3.Up()).normalize();
                    if (inputMap["w"]) camera.target.addInPlace(forwards.scale(speed));
                    if (inputMap["s"]) camera.target.addInPlace(forwards.scale(-speed));
                    if (inputMap["a"]) camera.target.addInPlace(sideways.scale(speed));
                    if (inputMap["d"]) camera.target.addInPlace(sideways.scale(-speed));
                }
            });

            // اختيار العناصر
            scene.onPointerDown = (evt, pickResult) => {
                if (pickResult.hit && pickResult.pickedMesh.name !== "ground") {
                    selectedMesh = pickResult.pickedMesh;
                }
            };

            // أزرار التحويل
            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                if (e.ctrlKey && e.key.toLowerCase() === "d") {
                    if (selectedMesh) {
                        let copy = selectedMesh.clone(selectedMesh.name + "_copy");
                        copy.position.x += 3;
                    }
                }
            });

            // --- إصلاح دالة جلب الملفات من GitHub ---
            async function fetchAssets() {
                const list = document.getElementById("file-list");
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                    const files = await response.json();
                    list.innerHTML = ""; 

                    files.forEach(f => {
                        // التحقق من اسم الملف بشكل صحيح
                        if (f.name.toLowerCase().endsWith(".glb")) {
                            let div = document.createElement("div");
                            div.className = "asset-item";
                            div.innerText = f.name;
                            div.onclick = () => {
                                pendingAssetUrl = f.download_url;
                                document.getElementById("selected-name").innerText = f.name;
                                document.getElementById("asset-info").style.display = "block";
                            };
                            list.appendChild(div);
                        }
                    });
                    
                    if(list.innerHTML === "") list.innerHTML = "<p style='opacity:0.5; text-align:center;'>No .glb files found</p>";
                } catch (err) {
                    list.innerHTML = "<p style='color:red; text-align:center;'>GitHub Sync Error</p>";
                    console.error(err);
                }
            }
            fetchAssets();

            // إضافة الموديل للعالم
            document.getElementById("spawn-btn").onclick = () => {
                if (pendingAssetUrl) {
                    document.getElementById("loading-bar").style.display = "block";
                    BABYLON.SceneLoader.ImportMesh("", "", pendingAssetUrl, scene, (meshes) => {
                        // تجميع الموديل لضمان عمل الـ Gizmo في المنتصف
                        let mainMesh = BABYLON.Mesh.MergeMeshes(meshes.filter(m => m.getTotalIndices() > 0), true, true, undefined, false, true);
                        if(mainMesh) {
                            mainMesh.position = camera.target.clone();
                            selectedMesh = mainMesh;
                        }
                        document.getElementById("loading-bar").style.display = "none";
                        document.getElementById("asset-info").style.display = "none";
                    }, (evt) => {
                        if (evt.lengthComputable) {
                            let p = ((evt.loaded * 100) / evt.total).toFixed();
                            document.getElementById("percent").innerText = p + "%";
                        }
                    });
                }
            };

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
