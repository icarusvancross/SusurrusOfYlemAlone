<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone - Tactical Lab</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        #renderCanvas { width: 100%; height: 100%; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; pointer-events: none; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #4af; }
        .key { color: #4af; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; color:#4af;">TACTICAL ENGINE V1.2</h2>
        <hr>
        <p>> <span class="key">Drag & Drop</span> .glb files to Import</p>
        <p>> <span class="key">G</span>: Move | <span class="key">R</span>: Rotate | <span class="key">S</span>: Scale</p>
        <p>> <span class="key">Shift + D</span>: Duplicate Selected</p>
        <p>> Status: <span style="color:#0f0;">Online</span></p>
    </div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            
            // سماء ضبابية زرقاء (الجحيم البارد)
            scene.clearColor = new BABYLON.Color4(0.02, 0.05, 0.1, 1);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
            scene.fogDensity = 0.02;
            scene.fogColor = new BABYLON.Color3(0.02, 0.05, 0.1);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 15, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);
            camera.lowerRadiusLimit = 2;

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // --- إنشاء الأرضية الرملية/الترابية ---
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            
            // إضافة نسيج الرمل (Texture)
            groundMat.diffuseTexture = new BABYLON.Texture("https://www.babylonjs-fast-element.com/assets/textures/dirt.jpg", scene);
            groundMat.diffuseTexture.uScale = 10; // تكرار النسيج لتبدو الأرض كبيرة
            groundMat.diffuseTexture.vScale = 10;
            groundMat.specularColor = new BABYLON.Color3(0, 0, 0); // إزالة اللمعان لجعلها تبدو تراباً حقيقياً
            ground.material = groundMat;
            ground.receiveShadows = true;

            // مدير الـ Gizmos
            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // تحميل الشجرة تلقائياً (إذا كانت مرفوعة على GitHub)
            BABYLON.SceneLoader.ImportMesh("", "", "Bigtree.glb", scene, function (meshes) {
                console.log("Tree loaded successfully");
            }, null, function(scene, message) {
                console.log("Tree not found on server, use Drag & Drop");
            });

            // اختصارات التحكم
            let selectedMesh = null;
            scene.onPointerDown = (evt, pickResult) => {
                if (pickResult.hit) { selectedMesh = pickResult.pickedMesh; }
            };

            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                
                // خدعة الـ Duplicate (النسخ)
                if (e.shiftKey && e.key === "D") {
                    if (selectedMesh && selectedMesh.name !== "ground") {
                        const newInstance = selectedMesh.instancedBuffers ? selectedMesh.createInstance("copy") : selectedMesh.clone("copy");
                        newInstance.position.x += 2;
                    }
                }
            });

            // ميزة السحب والافلات
            canvas.addEventListener("dragover", (e) => e.preventDefault());
            canvas.addEventListener("drop", (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    BABYLON.SceneLoader.ImportMesh("", "", URL.createObjectURL(files[0]), scene);
                }
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => { scene.render(); });
        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
