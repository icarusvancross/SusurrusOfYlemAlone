<!DOCTYPE html>
<html>
<head>
    <title>Susurrus Of Ylem Alone - Engine V7.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبات Babylon.js الضرورية -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <!-- واجهة المحرر (Editor UI) -->
    <div id="toolbar">
        <div class="logo">SUSURRUS ENGINE <span>V7.0</span></div>
        <div class="actions">
            <button id="btn-start-game" class="btn-play">START GAME</button>
            <button id="btn-toggle-assets">ASSETS & SETTINGS</button>
        </div>
    </div>

    <!-- البردة الجانبية -->
    <div id="side-panel">
        <div class="settings">
            <label>Mouse Sensitivity</label>
            <input type="range" id="rot-sens" min="500" max="5000" value="2000">
        </div>
        <h3>ASSET LIBRARY</h3>
        <div id="asset-browser"><div id="file-list">Scanning...</div></div>
    </div>

    <!-- واجهة اللعب (Game UI - مأخوذة من مشروعك القديم) -->
    <div id="game-ui">
        <div class="health-container"><div id="health-bar-fill"></div></div>
        <div id="ammo-count">9 / 50</div>
        <div id="controls-hint">[WASD] Move | [X] Aim | [C] Knife | [I] Inventory</div>
    </div>

    <!-- نظام الشنطة (Inventory - مأخوذ من مشروعك القديم) -->
    <div id="inventory-overlay">
        <div class="inventory-window">
            <h2>INVENTORY</h2>
            <div class="inv-grid">
                <div class="inv-item active">🔫 HANDGUN (9mm)</div>
                <div class="inv-item">🔪 COMBAT KNIFE</div>
                <div class="inv-item">🌿 GREEN HERB</div>
            </div>
            <p id="inv-ammo-text">AMMO: 9 / 50</p>
            <button onclick="document.getElementById('inventory-overlay').style.display='none'">CLOSE [I]</button>
        </div>
    </div>

    <!-- استدعاء ملفات البرمجة بالترتيب -->
    <script src="PlayerController.js"></script>
    <script src="main.js"></script>
</body>
</html>
