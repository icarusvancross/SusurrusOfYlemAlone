<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susurrus of Ylem Alone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="fullscreen-btn">ENTER THE ABYSS</button>
    
    <!-- واجهة الشنطة (Inventory) -->
    <div id="inventory-overlay">
        <div class="inventory-window">
            <h2 style="color: #f00; border-bottom: 1px solid #400;">INVENTORY</h2>
            <div class="inv-grid">
                <div class="inv-item active">🔫 HANDGUN (9mm)</div>
                <div class="inv-item">🔪 COMBAT KNIFE</div>
                <div class="inv-item">🌿 GREEN HERB</div>
            </div>
            <div class="inv-stats">
                <p id="inv-ammo-text">AMMO: 9 / 50</p>
                <p id="inv-hp-text">CONDITION: FINE</p>
            </div>
            <p style="font-size: 10px; color: #555;">PRESS [I] TO CLOSE</p>
        </div>
    </div>

    <div id="game-container"></div>
    
    <!-- واجهة المستخدم (HUD) -->
    <div id="ui-layer">
        <div class="health-container">
            <div id="health-bar-fill"></div>
        </div>
        <div id="ammo-count">9 / 50</div>
        <div id="controls-hint">[WASD] Move | [X] Aim | [V] Shoot | [C] Knife | [I] Inventory</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="PlayerController.js"></script>
    <script src="main.js"></script>
</body>
</html>
