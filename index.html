<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone Engine v5.0</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #top-shade { position: absolute; top: -75%; left: 0; width: 100%; height: 80%; background: rgba(10,10,15,0.95); border-bottom: 2px solid #d4a373; transition: top 0.4s ease; z-index: 100; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #top-shade.open { top: 0; }
        #shade-handle { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #d4a373; color: #000; border-radius: 0 0 10px 10px; cursor: pointer; text-align: center; font-weight: bold; font-size: 12px; line-height: 30px; pointer-events: auto; }
        .shade-content { display: flex; justify-content: space-around; height: 100%; }
        .column { width: 45%; display: flex; flex-direction: column; }
        #asset-browser { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border: 1px solid #333; }
        .asset-item { background: #1a1a1a; padding: 12px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; text-align: center; border: 1px solid #222; font-size: 13px; }
        .asset-item:hover { border-color: #d4a373; background: #222; }
        #ui-static { position: absolute; bottom: 20px; left: 20px; z-index: 10; pointer-events: auto; }
        .btn-tool { background: rgba(0,0,0,0.7); border: 1px solid #d4a373; color: #d4a373; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #asset-info { position: absolute; bottom: 80px; right: 20px; width: 200px; background: rgba(0,0,0,0.9); border: 1px solid #d4a373; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <div id="top-shade">
        <div class="shade-content">
            <div class="column">
                <h2 style="margin:0;">TACTICAL ENGINE <span style="color:#d4a373">V5.0</span></h2>
                <p style="opacity:0.5; font-size: 12px;">Unreal Fly Mode Active (X, Y, Z)</p>
                <div style="margin-top:10px;">
                    <label style="font-size:12px; color:#d4a373;">Engine Sensitivity</label><br>
                    <input type="range" id="sens-slider" min="500" max="5000" value="1500" style="width:100%;">
                </div>
                <p style="font-size: 11px; margin-top:20px; line-height: 1.6;">
                    - <span style="color:#d4a373">[Right Click]</span> Rotate (Unreal Style)<br>
                    - <span style="color:#d4a373">[Shift + WASD]</span> Fly towards mouse look<br>
                    - <span style="color:#d4a373">[Scroll]</span> Zoom In/Out<br>
                    - <span style="color:#d4a373">[Double Tap]</span> Focus on Object<br>
                    - <span style="color:#d4a373">[G, R, S]</span> Gizmos | <span style="color:#d4a373">[CTRL+D]</span> Duplicate
                </p>
            </div>
            <div class="column">
                <h3 style="font-size: 14px; color:#d4a373;">ASSET LIBRARY</h3>
                <div id="asset-browser"><div id="file-list">Scanning GitHub...</div></div>
            </div>
        </div>
        <div id="shade-handle">ASSETS & SETTINGS</div>
    </div>

    <div id="ui-static">
        <button class="btn-tool" onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>

    <div id="asset-info">
        <h4 id="selected-name" style="margin:0; color:#d4a373; font-size:14px;">File.glb</h4>
        <button class="btn-tool" id="spawn-btn" style="width:100%; margin-top:10px;">ADD TO WORLD</button>
    </div>

    <script>
        const GITHUB_USER = "icarusvancross";
        const GITHUB_REPO = "SusurrusOfYlemAlone";
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let pendingAssetUrl = null;
        let selectedMesh = null;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.02, 1);
            
            // الكاميرا المدارية مع دعم حركة Unreal
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 25, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true, false, 2); // 2 تعني كليك يمين للتدوير
            camera.wheelPrecision = 50;

            const sensSlider = document.getElementById("sens-slider");
            camera.angularSensibilityX = camera.angularSensibilityY = sensSlider.value;
            sensSlider.oninput = () => { camera.angularSensibilityX = camera.angularSensibilityY = sensSlider.value; };

            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.5;
            const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.0;

            // الأرضية السوداء
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 500, height: 500}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.01, 0.01, 0.01);
            const noise = new BABYLON.NoiseProceduralTexture("noise", 512, scene);
            noise.octaves = 8;
            groundMat.emissiveTexture = noise;
            groundMat.emissiveColor = new BABYLON.Color3(0.1, 0.1, 0.1);
            ground.material = groundMat;

            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // نظام حركة Unreal (X, Y, Z)
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                if (evt.sourceEvent.ctrlKey && evt.sourceEvent.key === "d") evt.sourceEvent.preventDefault();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                if (inputMap["shift"]) {
                    // حساب السرعة بناءً على السلايدر (كلما قل الرقم زادت السرعة هنا)
                    let speed = (6000 - sensSlider.value) / 10000; 
                    
                    // المتجه الأمامي الكامل (بما في ذلك الارتفاع Y)
                    let forward = camera.getForwardRay().direction;
                    // المتجه الجانبي
                    let right = BABYLON.Vector3.Cross(BABYLON.Vector3.Up(), forward).normalize();

                    if (inputMap["w"]) camera.target.addInPlace(forward.scale(speed));
                    if (inputMap["s"]) camera.target.addInPlace(forward.scale(-speed));
                    if (inputMap["a"]) camera.target.addInPlace(right.scale(speed));
                    if (inputMap["d"]) camera.target.addInPlace(right.scale(-speed));
                }
            });

            // دبل تاب للتركيز
            let lastTap = 0;
            canvas.addEventListener('pointerdown', (e) => {
                let currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    if (selectedMesh) camera.setTarget(selectedMesh.position.clone());
                }
                lastTap = currentTime;
            });

            scene.onPointerDown = (evt, pickResult) => {
                if (pickResult.hit && pickResult.pickedMesh.name !== "ground") {
                    selectedMesh = pickResult.pickedMesh;
                }
            };

            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                if (e.ctrlKey && e.key.toLowerCase() === "d" && selectedMesh) {
                    let copy = selectedMesh.clone(selectedMesh.name + "_copy");
                    copy.position.x += 5;
                }
            });

            const shade = document.getElementById("top-shade");
            document.getElementById("shade-handle").onclick = () => { shade.classList.toggle("open"); };

            async function fetchAssets() {
                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                    const files = await res.json();
                    const list = document.getElementById("file-list");
                    list.innerHTML = "";
                    files.forEach(f => {
                        if (f.name.toLowerCase().endsWith(".glb")) {
                            let d = document.createElement("div");
                            d.className = "asset-item"; d.innerText = f.name;
                            d.onclick = () => {
                                pendingAssetUrl = f.download_url;
                                document.getElementById("selected-name").innerText = f.name;
                                document.getElementById("asset-info").style.display = "block";
                            };
                            list.appendChild(d);
                        }
                    });
                } catch(e) { console.error("GitHub Fail"); }
            }
            fetchAssets();

            document.getElementById("spawn-btn").onclick = () => {
                if (pendingAssetUrl) {
                    BABYLON.SceneLoader.ImportMesh("", "", pendingAssetUrl, scene, (meshes) => {
                        let main = BABYLON.Mesh.MergeMeshes(meshes.filter(m => m.getTotalIndices() > 0), true, true, undefined, false, true);
                        if(main) main.position = camera.target.clone();
                        document.getElementById("asset-info").style.display = "none";
                    });
                }
            };

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());

        function toggleFullscreen() {
            if (!document.fullscreenElement) canvas.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
