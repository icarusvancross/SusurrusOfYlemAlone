<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone - Engine V6.0</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #toolbar { position: absolute; top: 0; left: 0; width: 100%; height: 45px; background: rgba(15,15,20,0.95); border-bottom: 2px solid #d4a373; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        #side-panel { position: absolute; top: 45px; right: -260px; width: 250px; height: calc(100% - 45px); background: rgba(10,10,15,0.98); border-left: 1px solid #333; transition: right 0.3s ease; padding: 15px; box-sizing: border-box; z-index: 90; }
        #side-panel.open { right: 0; }
        .btn-main { background: #d4a373; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-play { background: #2ecc71; color: #000; }
        #asset-browser { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid #222; padding: 5px; margin-top: 10px; }
        .asset-item { background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 3px; cursor: pointer; text-align: center; font-size: 12px; }
        #ui-play-mode { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; display: none; z-index: 110; }
        .hud-hint { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; border: 1px solid #2ecc71; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="renderCanvas"></canvas>

    <!-- واجهة المحرر -->
    <div id="toolbar">
        <div style="color: #d4a373; font-weight: bold;">SUSURRUS ENGINE <span style="color:white">V6.0</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main btn-play" id="btn-start-game">START GAME</button>
            <button class="btn-main" id="btn-toggle-assets">ASSETS & SETTINGS</button>
        </div>
    </div>

    <div id="side-panel">
        <div style="margin-bottom: 15px;">
            <label style="font-size: 11px; color:#d4a373;">Camera Sensitivity</label>
            <input type="range" id="rot-sens" min="500" max="5000" value="2000" style="width:100%;">
        </div>
        <h3 style="font-size: 13px; color: #d4a373;">ASSET LIBRARY</h3>
        <div id="asset-browser"><div id="file-list">Scanning...</div></div>
        <div id="asset-info" style="display:none; margin-top:10px; border:1px solid #d4a373; padding:10px;">
            <div id="selected-name" style="font-size:11px; margin-bottom:5px;">File.glb</div>
            <button class="btn-main" id="spawn-btn" style="width:100%">ADD TO WORLD</button>
        </div>
    </div>

    <!-- واجهة اللعب -->
    <div id="ui-play-mode">
        <span class="hud-hint">PLAY MODE ACTIVE - PRESS [ESC] TO RETURN TO EDITOR</span>
    </div>

    <script>
        const GITHUB_USER = "icarusvancross";
        const GITHUB_REPO = "SusurrusOfYlemAlone";
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        
        let isPlayMode = false;
        let pendingAssetUrl = null;
        let selectedMesh = null;
        let playerProxy = null;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.03, 1);
            scene.collisionsEnabled = true;

            // 1. كاميرا المحرر
            const camera = new BABYLON.ArcRotateCamera("editorCam", -Math.PI / 2, Math.PI / 2.5, 30, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true, false, 2); 
            
            // 2. الإضاءة
            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.7;
            const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.0;

            // 3. الأرضية الرملية (تفتيح اللون)
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 500, height: 500}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.5, 0.45, 0.35); // لون رملي أوضح
            ground.material = groundMat;
            ground.checkCollisions = true;

            // 4. المكعب الأخضر (Player Start Proxy)
            playerProxy = BABYLON.MeshBuilder.CreateBox("PlayerProxy", {height: 2, width: 1, depth: 1}, scene);
            const playerMat = new BABYLON.StandardMaterial("playerMat", scene);
            playerMat.diffuseColor = new BABYLON.Color3(0, 1, 0);
            playerMat.alpha = 0.7;
            playerProxy.material = playerMat;
            playerProxy.position.y = 1;
            playerProxy.checkCollisions = true;
            playerProxy.ellipsoid = new BABYLON.Vector3(0.5, 1, 0.5); // حجم التصادم

            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // 5. نظام الحركة والإدخال
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                if (evt.sourceEvent.key === "Escape" && isPlayMode) exitPlayMode();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                if (isPlayMode) {
                    // حركة اللاعب (WASD) في وضع اللعب
                    let speed = 0.15;
                    let forward = camera.getForwardRay().direction;
                    forward.y = 0; forward.normalize();
                    let right = BABYLON.Vector3.Cross(BABYLON.Vector3.Up(), forward).normalize();

                    let move = BABYLON.Vector3.Zero();
                    if (inputMap["w"]) move.addInPlace(forward);
                    if (inputMap["s"]) move.addInPlace(forward.scale(-1));
                    if (inputMap["a"]) move.addInPlace(right.scale(-1)); // تصحيح A
                    if (inputMap["d"]) move.addInPlace(right);          // تصحيح D
                    
                    playerProxy.moveWithCollisions(move.scale(speed));
                    // الكاميرا تتبع المكعب
                    camera.setTarget(playerProxy.position);
                } else if (inputMap["shift"]) {
                    // حركة الكاميرا في وضع المحرر
                    let speed = 0.5;
                    let forward = camera.getForwardRay().direction;
                    let right = BABYLON.Vector3.Cross(BABYLON.Vector3.Up(), forward).normalize();
                    if (inputMap["w"]) camera.target.addInPlace(forward.scale(speed));
                    if (inputMap["s"]) camera.target.addInPlace(forward.scale(-speed));
                    if (inputMap["a"]) camera.target.addInPlace(right.scale(speed)); // تصحيح A
                    if (inputMap["d"]) camera.target.addInPlace(right.scale(-speed)); // تصحيح D
                }
            });

            // 6. وظائف التبديل بين الأوضاع
            const startPlayMode = () => {
                isPlayMode = true;
                gizmoManager.attachToMesh(null); // إخفاء الـ Gizmos
                document.getElementById("toolbar").style.display = "none";
                document.getElementById("side-panel").classList.remove("open");
                document.getElementById("ui-play-mode").style.display = "block";
                camera.radius = 10; // تقريب الكاميرا خلف اللاعب
            };

            const exitPlayMode = () => {
                isPlayMode = false;
                document.getElementById("toolbar").style.display = "flex";
                document.getElementById("ui-play-mode").style.display = "none";
            };

            document.getElementById("btn-start-game").onclick = startPlayMode;
            document.getElementById("btn-toggle-assets").onclick = () => document.getElementById("side-panel").classList.toggle("open");

            // جلب الأصول من GitHub
            async function fetchAssets() {
                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                    const files = await res.json();
                    const list = document.getElementById("file-list");
                    list.innerHTML = "";
                    files.forEach(f => {
                        if (f.name.toLowerCase().endsWith(".glb")) {
                            let d = document.createElement("div");
                            d.className = "asset-item"; d.innerText = f.name;
                            d.onclick = () => {
                                pendingAssetUrl = f.download_url;
                                document.getElementById("selected-name").innerText = f.name;
                                document.getElementById("asset-info").style.display = "block";
                            };
                            list.appendChild(d);
                        }
                    });
                } catch(e) {}
            }
            fetchAssets();

            document.getElementById("spawn-btn").onclick = () => {
                if (pendingAssetUrl) {
                    BABYLON.SceneLoader.ImportMesh("", "", pendingAssetUrl, scene, (meshes) => {
                        let main = BABYLON.Mesh.MergeMeshes(meshes.filter(m => m.getTotalIndices() > 0), true, true, undefined, false, true);
                        if(main) {
                            main.position = camera.target.clone();
                            main.checkCollisions = true; // تفعيل التصادم للأشجار
                        }
                    });
                }
            };

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());

        function toggleFullscreen() {
            if (!document.fullscreenElement) canvas.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
