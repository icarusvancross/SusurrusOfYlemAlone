<!DOCTYPE html>
<html>
<head>
    <title>SusurrusOfYlemAlone Engine v3.0</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #ui-top { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; border-left: 5px solid #d4a373; pointer-events: none; }
        #asset-browser { position: absolute; top: 10px; right: 10px; width: 220px; height: 80%; background: rgba(10,10,10,0.95); border: 1px solid #333; color: #eee; padding: 10px; border-radius: 8px; overflow-y: auto; }
        #asset-info { position: absolute; bottom: 20px; right: 10px; width: 220px; background: rgba(10,10,10,0.95); border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; display: none; }
        .asset-item { background: #1a1a1a; padding: 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; text-align: center; font-size: 13px; border: 1px solid #222; }
        .asset-item:hover { background: #252525; border-color: #d4a373; }
        .btn-spawn { width: 100%; background: #d4a373; color: #000; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2 style="margin:0; font-size: 18px; color:#d4a373;">TACTICAL ENGINE V3.0</h2>
        <p style="font-size: 11px; opacity:0.6;">Auto-Sync: GitHub Repository</p>
        <hr style="border:0; border-top:1px solid #333;">
        <p style="font-size: 12px;">[Shift+WASD] Fly | [G,R,S] Gizmos</p>
        <p style="font-size: 12px;">[CTRL+D] Duplicate Selected</p>
    </div>

    <div id="asset-browser">
        <h3 style="font-size: 14px; text-align: center; color: #d4a373;">REMOTE ASSETS</h3>
        <div id="file-list"><p style="text-align:center; font-size:12px; opacity:0.5;">Scanning GitHub...</p></div>
    </div>

    <div id="asset-info">
        <h4 id="selected-name" style="margin:0; color:#d4a373;">None</h4>
        <button class="btn-spawn" id="spawn-btn">ADD TO SCENE</button>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        // --- إعدادات المستودع (سيقرأ منها تلقائياً) ---
        const GITHUB_USER = "icarusvancross";
        const GITHUB_REPO = "SusurrusOfYlemAlone";
        
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let pendingAssetUrl = null;
        let pendingAssetName = null;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 20, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, true);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.4;
            const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 0.8;

            // --- الأرضية السوداء بنقاط (الرمل العاتم) ---
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 200, height: 200}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.02, 0.02, 0.02); // سواد عتم
            
            // محاكاة النقاط الصفراء والبيضاء
            const noise = new BABYLON.NoiseProceduralTexture("noise", 512, scene);
            noise.octaves = 10;
            noise.persistence = 0.8;
            groundMat.emissiveTexture = noise; // جعل النقاط تضيء قليلاً
            groundMat.emissiveColor = new BABYLON.Color3(0.2, 0.15, 0.1); // لون النقاط (ذهبي باهت)
            
            ground.material = groundMat;

            const gizmoManager = new BABYLON.GizmoManager(scene);
            gizmoManager.usePointerToAttachGizmos = true;

            // نظام الحركة WASD
            let inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                if (evt.ctrlKey && evt.sourceEvent.key === "d") evt.sourceEvent.preventDefault();
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            scene.onBeforeRenderObservable.add(() => {
                if (inputMap["shift"]) {
                    let speed = 0.4;
                    let forwards = camera.getForwardRay().direction;
                    forwards.y = 0; forwards.normalize();
                    let sideways = BABYLON.Vector3.Cross(forwards, BABYLON.Vector3.Up()).normalize();
                    if (inputMap["w"]) camera.target.addInPlace(forwards.scale(speed));
                    if (inputMap["s"]) camera.target.addInPlace(forwards.scale(-speed));
                    if (inputMap["a"]) camera.target.addInPlace(sideways.scale(speed));
                    if (inputMap["d"]) camera.target.addInPlace(sideways.scale(-speed));
                }
            });

            // تدبيل CTRL+D
            let selectedMesh = null;
            scene.onPointerDown = (evt, pickResult) => { if (pickResult.hit) selectedMesh = pickResult.pickedMesh; };
            window.addEventListener("keydown", (e) => {
                if (e.key === "g") { gizmoManager.positionGizmoEnabled = true; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "r") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = true; gizmoManager.scaleGizmoEnabled = false; }
                if (e.key === "s") { gizmoManager.positionGizmoEnabled = false; gizmoManager.rotationGizmoEnabled = false; gizmoManager.scaleGizmoEnabled = true; }
                if (e.ctrlKey && e.key.toLowerCase() === "d") {
                    if (selectedMesh && selectedMesh.name !== "ground") {
                        let copy = selectedMesh.clone(selectedMesh.name + "_copy");
                        copy.position.x += 3;
                    }
                }
            });

            // --- وظيفة مسح GitHub التلقائية ---
            async function scanGitHubAssets() {
                const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;
                try {
                    const response = await fetch(url);
                    const files = await response.json();
                    const listContainer = document.getElementById("file-list");
                    listContainer.innerHTML = ""; // مسح رسالة التحميل

                    files.forEach(file => {
                        if (file.name.endsWith(".glb")) {
                            const item = document.createElement("div");
                            item.className = "asset-item";
                            item.innerText = file.name;
                            item.onclick = () => {
                                pendingAssetUrl = file.download_url;
                                pendingAssetName = file.name;
                                document.getElementById("selected-name").innerText = file.name;
                                document.getElementById("asset-info").style.display = "block";
                            };
                            listContainer.appendChild(item);
                        }
                    });
                } catch (e) {
                    document.getElementById("file-list").innerText = "GitHub Sync Error";
                }
            }

            scanGitHubAssets();

            document.getElementById("spawn-btn").onclick = () => {
                if (pendingAssetUrl) {
                    BABYLON.SceneLoader.ImportMesh("", "", pendingAssetUrl, scene, (meshes) => {
                        meshes[0].position = camera.target.clone();
                        document.getElementById("asset-info").style.display = "none";
                    });
                }
            };

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => { scene.render(); });
        window.addEventListener("resize", () => { engine.resize(); });
    </script>
</body>
</html>
